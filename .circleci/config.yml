---
version: 2.1
orbs:
  ruby: circleci/ruby@2.0.1
  browser-tools: circleci/browser-tools@1.4.8
jobs:
  test:
    docker:
      - image: cimg/ruby:2.7.4-browsers
    steps:
      - checkout
      - browser-tools/install-chrome
      - browser-tools/install-chromedriver
      - run:
          command: |
            google-chrome --version
            chromedriver --version
          name: Check chrome install
      - ruby/install-deps:
          key: gem-2
      - run: circleci tests glob "spec/**/*_spec.rb"
      - run: circleci tests glob "spec/**/*_spec.rb" | circleci tests split --split-by=filesize
      - run:
          command: |
            mkdir -p ~/rspec
            TESTFILES=$(circleci tests glob "spec/**/*_spec.rb" | circleci tests split --split-by=filesize)
            echo $TESTFILES
            bundle exec rspec $TESTFILES --format RspecJunitFormatter --out ~/rspec/rspec.xml --format progress
          name: Run rspec with circleci config
      # - run:
      #     name: RSpec Tests
      #     command: |
      #       circleci tests glob "spec/**/*_spec.rb" | circleci tests run --command="xargs bundle exec rspec --format progress --format RspecJunitFormatter -o ~/rspec/rspec.xml" --verbose --split-by=timings
      - store_test_results:
          path: ~/rspec/rspec.xml
workflows:
  test_build:
    jobs:
      - test
